---
id: acme
title: Acme APIs
overview: |
  Combined HTTP (OpenAPI), gRPC (protobuf), events (AsyncAPI), and JSON-RPC
  (OpenRPC) reference for Acme v1, v2, and v3alpha1 — the same three-version
  corpus used by the mdbook-openapi, mdbook-protobuf, mdbook-asyncapi, and
  mdbook-openrpc examples.
contracts:
  - family: openapi
    module_root: ../../crates/switchback-openapi/tests/fixtures/micro/acme
    inputs:
      - v1/openapi.yaml
      - v2/openapi.yaml
      - v3alpha1/openapi.yaml
  - family: protobuf
    module_root: ../../crates/switchback-protobuf/tests/fixtures/proto
    inputs:
      - acme/example/v1/echo.proto
      - acme/example/v1/gateway.proto
      - acme/example/v2/types.proto
      - acme/example/v2/catalog.proto
      - acme/example/v2/services.proto
      - acme/example/v3alpha1/types.proto
      - acme/example/v3alpha1/pipeline.proto
      - acme/example/v3alpha1/services.proto
  - family: asyncapi
    module_root: ../../crates/switchback-asyncapi/tests/fixtures/micro/acme
    inputs:
      - v1/asyncapi.yaml
      - v2/asyncapi.yaml
      - v3alpha1/asyncapi.yaml
  - family: openrpc
    module_root: ../../crates/switchback-openrpc/tests/fixtures/micro/acme
    inputs:
      - v1/openrpc.json
      - v2/openrpc.json
      - v3alpha1/openrpc.json
