name: yaml-lint

on:
  push:
    branches: [main]
    paths:
      - ".yamllint"
      - "crates/**"
      - "examples/**"
      - "proto/**"
  # Required on every PR to main (ruleset); do not path-filter pull_request —
  # path filters apply per push event, not the full MR diff vs base.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ryl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ryl
          cache-bin: true

      - name: Install ryl
        run: cargo install ryl --locked

      - name: ryl .
        run: ryl .
