name: yaml-lint

on:
  push:
    branches: [main]
    paths:
      - ".yamllint"
      - "crates/**"
      - "examples/**"
      - "proto/**"
  # Required on every PR to main (ruleset). Do not add `paths` here — if a
  # required workflow is skipped, its checks stay Pending and block merge.
  #
  # GitHub path filter diffs (docs.github.com/actions/using-workflows/workflow-syntax):
  # - pull_request: three-dot diff vs base (full PR delta, not just the latest push)
  # - push: two-dot diff for the pushed commit(s) only
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ryl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ryl
          cache-bin: true

      - name: Install ryl
        run: cargo install ryl --locked

      - name: ryl .
        run: ryl .
