name: yaml-lint

on:
  push:
    branches: [main]
    paths:
      - ".yamllint"
      - "crates/**"
      - "examples/**"
      - "proto/**"
  pull_request:
    branches: [main]
    paths:
      - ".yamllint"
      - "crates/**"
      - "examples/**"
      - "proto/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ryl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ryl
        run: cargo install ryl --locked

      - name: ryl .
        run: ryl .
