name: yaml-lint

on:
  pull_request:
    branches: [main]
  # All branch pushes so required checks run on the HEAD SHA when pull_request
  # synchronize is missed (strict ruleset).
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ryl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ryl
          cache-bin: true

      - name: Install ryl
        run: cargo install ryl --locked

      - name: ryl .
        run: ryl .
