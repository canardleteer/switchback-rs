name: rust-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
          - platform: macos-arm64
            os: macos-14
          - platform: windows-amd64
            os: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo
          cache-bin: false

      - name: cargo xtask ci
        run: cargo xtask ci

      # Node 24 runtime; see audit-check commit 858dc40 in workflow history.
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432

      - name: cargo xtask align-workspace-versions --check
        if: matrix.platform == 'linux-amd64'
        run: cargo xtask align-workspace-versions --check
