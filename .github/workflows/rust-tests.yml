name: rust-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-gate:
    name: linux-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo
          cache-bin: false

      - name: cargo xtask align-workspace-versions --check
        run: cargo xtask align-workspace-versions --check

      - name: cargo xtask fmt-check
        run: cargo xtask fmt-check

      - name: cargo xtask check
        run: cargo xtask check

      - name: cargo xtask clippy
        run: cargo xtask clippy

      - name: cargo xtask publish-check
        run: cargo xtask publish-check

      # Node 24 runtime; see audit-check commit 858dc40 in workflow history.
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  ci:
    name: ${{ matrix.platform }}
    needs: linux-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
          - platform: macos-arm64
            os: macos-14
          - platform: windows-amd64
            os: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo
          cache-bin: false

      - name: cargo xtask check
        if: matrix.platform != 'linux-amd64'
        run: cargo xtask check

      - name: cargo xtask clippy
        if: matrix.platform != 'linux-amd64'
        run: cargo xtask clippy

      - name: cargo xtask ci-post
        run: cargo xtask ci-post
