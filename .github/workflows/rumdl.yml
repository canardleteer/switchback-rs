name: rumdl

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/rumdl.yml"
  # Required on every PR to main (ruleset); do not path-filter pull_request —
  # path filters apply per push event, not the full MR diff vs base.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: rvben/rumdl@v0
        with:
          config: .rumdl.toml
          args: --respect-gitignore
