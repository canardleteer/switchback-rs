name: rumdl

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/rumdl.yml"
  # Required on every PR to main (ruleset). Do not add `paths` here — if a
  # required workflow is skipped, its checks stay Pending and block merge.
  # GitHub path filters behave differently by event (see workflow comments in
  # yaml-lint.yml).
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: rvben/rumdl@v0
        with:
          config: .rumdl.toml
          args: --respect-gitignore
