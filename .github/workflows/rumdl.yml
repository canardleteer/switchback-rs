name: rumdl

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/rumdl.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".rumdl.toml"
      - ".github/workflows/rumdl.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: rvben/rumdl@v0
        with:
          config: .rumdl.toml
          args: --respect-gitignore
