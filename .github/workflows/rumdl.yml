name: rumdl

on:
  pull_request:
    branches: [main]
  # All branch pushes so required checks run on the HEAD SHA when pull_request
  # synchronize is missed (strict ruleset).
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: rvben/rumdl@v0
        with:
          config: .rumdl.toml
          args: --respect-gitignore
