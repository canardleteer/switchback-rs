---
openapi: 3.1.0
info:
  title: Acme Example API v3alpha1
  version: 3alpha1
  description: Alpha feature flags, experiments, and pipeline orchestration.
servers:
  - url: https://api.acme.example/v3alpha1
    description: Live v3alpha1 base URL (concurrent with v1 and v2)
paths:
  /feature-flags:
    get:
      operationId: listFeatureFlags
      summary: List feature flags (paginated)
      description: |
        Lists feature flags for a tenant, optionally filtered by **release
        channel**.

        Alpha APIs may change without notice; pin clients to explicit flag keys.
      parameters:
        - name: tenant_id
          in: query
          required: true
          description: Tenant whose flags are listed.
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: page_token
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/ReleaseChannel'
      responses:
        '200':
          description: Flag page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFeatureFlagsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: upsertFlagOverride
      summary: Upsert a tenant flag override
      description: |
        Creates or replaces a tenant-specific override for a single flag key.

        Overrides take precedence over channel defaults until removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlagOverride'
      responses:
        '200':
          description: Stored override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlagOverride'
  /experiments/{experiment_id}/assign:
    post:
      operationId: assignExperiment
      summary: Assign a subject to an experiment arm
      description: |
        Assigns a subject to an experiment arm using deterministic hashing.

        Supply `exclusion_keys` to respect mutual-exclusion groups across
        concurrent experiments.
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignExperimentRequest'
      responses:
        '200':
          description: Assignment row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentAssignment'
        '404':
          $ref: '#/components/responses/NotFound'
  /experiments/{experiment_id}/assignments/stream:
    get:
      operationId: streamAssignments
      summary: Stream experiment assignments (SSE)
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Assignment events
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
  /pipelines:
    post:
      operationId: startPipeline
      summary: Start a pipeline run (LRO handle)
      description: |
        Starts an asynchronous pipeline and returns a **long-running operation**
        handle (`PipelineRun`).

        Poll `GET /pipelines/{run_id}` or subscribe with the watch stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPipelineRequest'
      responses:
        '202':
          description: Pipeline accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRun'
        '400':
          $ref: '#/components/responses/BadRequest'
  /pipelines/{run_id}:
    get:
      operationId: getPipelineRun
      summary: Poll pipeline run status (LRO)
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Current run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRun'
        '404':
          $ref: '#/components/responses/NotFound'
  /pipelines/{run_id}/watch:
    get:
      operationId: watchPipeline
      summary: Watch pipeline step events (SSE)
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Step result events
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ExperimentId:
      name: experiment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ReleaseChannel:
      type: string
      enum: [stable, beta, canary, internal]
    FeatureFlag:
      type: object
      properties:
        key:
          type: string
        enabled:
          type: boolean
        channel:
          $ref: '#/components/schemas/ReleaseChannel'
    FlagOverride:
      type: object
      required: [tenant_id, key, enabled]
      properties:
        tenant_id:
          type: string
        key:
          type: string
        enabled:
          type: boolean
    ListFeatureFlagsResponse:
      type: object
      properties:
        flags:
          type: array
          items:
            $ref: '#/components/schemas/FeatureFlag'
        page:
          $ref: '../v2/openapi.yaml#/components/schemas/PageResult'
    AssignExperimentRequest:
      type: object
      required: [subject_id]
      properties:
        subject_id:
          type: string
        exclusion_keys:
          type: array
          items:
            type: string
    ExperimentAssignment:
      type: object
      properties:
        experiment_id:
          type: string
          format: uuid
        subject_id:
          type: string
        arm:
          type: string
        assigned_at:
          type: string
          format: date-time
    PipelineStatus:
      type: string
      enum: [queued, running, succeeded, failed, cancelled]
    PipelineStepResult:
      type: object
      properties:
        step_name:
          type: string
        status:
          $ref: '#/components/schemas/PipelineStatus'
        finished_at:
          type: string
          format: date-time
    StartPipelineRequest:
      type: object
      required: [pipeline_name]
      properties:
        pipeline_name:
          type: string
        actor:
          type: string
    PipelineRun:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        pipeline_name:
          type: string
        status:
          $ref: '#/components/schemas/PipelineStatus'
        results:
          type: array
          items:
            $ref: '#/components/schemas/PipelineStepResult'
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    Problem:
      $ref: '../shared/schemas.yaml#/Problem'
  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
