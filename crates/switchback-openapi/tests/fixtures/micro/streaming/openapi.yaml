---
openapi: 3.1.0
info:
  title: Streaming Example
  version: 1.0.0
paths:
  /events:
    get:
      summary: Server-sent events
      responses:
        "200":
          description: event stream
          content:
            text/event-stream:
              schema:
                type: string
  /upload:
    put:
      summary: Upload binary stream
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: accepted
