syntax = "proto3";

package canardleteer.switchback.protocol.mqtt.v1alpha1;

// MQTT protocol attachments (protocol_id = "mqtt").
//
// AsyncAPI mqtt binding 0.2.0 operation/message fields and channel topic
// addresses. Payload bytes on ProtocolAttachment encode exactly one arm of
// MqttPayload below.

// Top-level oneof for all MQTT protocol attachments.
message MqttPayload {
  oneof kind {
    // Contract.protocols[] — broker URL hints when documented.
    MqttContractMeta contract = 1;
    // ChannelBody.protocols[] — MQTT topic filter / channel address.
    MqttChannelMeta channel = 2;
    // OperationBody.protocols[] — QoS, retain, expiry interval.
    MqttOperationMeta operation = 3;
    // MessageBody.protocols[] — response topic and payload format hints.
    MqttMessageMeta message = 4;
  }
}

// Contract-level MQTT transport context.
message MqttContractMeta {
  // Advertised broker URLs when documented on servers.
  repeated string broker_urls = 1;
}

// MQTT channel / topic representation.
message MqttChannelMeta {
  // MQTT topic filter or channel address.
  string topic = 1;
}

// MQTT operation metadata.
message MqttOperationMeta {
  // Quality of service level: 0, 1, or 2.
  uint32 qos = 1;
  // Whether the broker should retain the message.
  bool retain = 2;
  // Message expiry interval in seconds when documented as a literal.
  uint64 message_expiry_interval = 3;
}

// MQTT message metadata.
message MqttMessageMeta {
  // Payload format indicator: 0 unspecified, 1 UTF-8 character data.
  uint32 payload_format_indicator = 1;
  // Response topic when documented as a literal string.
  string response_topic = 2;
  // Content type when documented on the binding.
  string content_type = 3;
}
